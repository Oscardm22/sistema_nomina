<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Nómina Venezuela{% endblock %}</title>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuración personalizada de Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                        },
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='images/logos/favicon.ico') }}" type="image/x-icon">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logos/favicon.ico') }}" type="image/x-icon">

    <!-- Para mejor soporte en todos los dispositivos -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logos/favicon.ico') }}">
    <meta name="theme-color" content="#0ea5e9">

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navbar -->
    <nav class="bg-primary-700 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <!-- Logo + Texto -->
                <div class="flex items-center space-x-3">
                    <a href="/" class="flex items-center space-x-3 no-underline">
                        <!-- Tu logo (más pequeño) -->
                        <img src="{{ url_for('static', filename='images/logos/logo_blanco.svg') }}" 
                            alt="Logo" 
                            class="h-8 w-auto object-contain">
                        
                        <!-- Texto separado -->
                        <div class="flex flex-col">
                            <span class="text-xl font-bold text-white leading-tight">
                                Sistema
                            </span>
                            <span class="text-lg font-semibold text-primary-200 leading-tight">
                                Nómina
                            </span>
                        </div>
                    </a>
                </div>
                
                <!-- Menú -->
                <div class="space-x-4">
                    <a href="/" class="hover:text-primary-100 transition px-3 py-2 rounded">
                        Inicio
                    </a>
                    <a href="/login" class="hover:text-primary-100 transition px-3 py-2 rounded">
                        Iniciar Sesión
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Contenido principal -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Footer -->
    <footer class="mt-12 border-t border-gray-200 bg-white">
        <div class="text-center text-gray-600">
            <div class="mb-2">
                <!-- Logo pequeño en footer -->
                <img src="{{ url_for('static', filename='images/logos/logo.svg') }}" 
                    alt="Logo" 
                    class="h-6 w-auto object-contain mx-auto mb-2">
                <span class="font-medium">Sistema de Nómina</span>
            </div>
        </div>
    </footer>
    
    <!-- Scripts -->
    {% block extra_js %}{% endblock %}
</body>
</html>
